[package]
name = "nexterm-vt-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

# Sprint 3-5: cargo-fuzz infrastructure for the nexterm-vt VT parser, the
# Sixel / Kitty decoders, and the OSC URL handler.
#
# The parent workspace (the root Cargo.toml) already lists
# `exclude = ["nexterm-vt/fuzz"]`, but recent cargo versions cannot suppress
# workspace inference from a subcrate using `exclude` alone, and cargo-fuzz
# fails with "current package believes it's in a workspace when it's not".
# Following the standard template generated by `cargo fuzz init`, this manifest
# is declared as a self-contained workspace (see the `[workspace]` table below).
#
# Example usage:
#   cargo install cargo-fuzz
#   cd nexterm-vt
#   cargo +nightly fuzz run vt_parser_input -- -max_total_time=60

[package.metadata]
cargo-fuzz = true

# Declare this manifest as an independent workspace so that inference from the
# parent workspace is cut off (the pattern used by cargo-fuzz's official template).
[workspace]
members = ["."]

[dependencies]
libfuzzer-sys = "0.4"
nexterm-vt = { path = ".." }

[[bin]]
name = "vt_parser_input"
path = "fuzz_targets/vt_parser_input.rs"
test = false
doc = false
bench = false

[[bin]]
name = "sixel_decode"
path = "fuzz_targets/sixel_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "kitty_image"
path = "fuzz_targets/kitty_image.rs"
test = false
doc = false
bench = false

[[bin]]
name = "osc_url"
path = "fuzz_targets/osc_url.rs"
test = false
doc = false
bench = false

# The fuzz binaries do not target riscv-none-eabi or similar, so raise the
# optimization level to shorten execution time.
[profile.release]
debug = 1

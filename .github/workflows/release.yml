name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

# GitHub Release への書き込み権限
permissions:
  contents: write

jobs:
  # ── Step 1: Release ページを先に作成する ──────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Step 2: 各プラットフォームのバイナリをビルドして添付する ──────
  build:
    name: Build (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            archive_ext: tar.gz

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            archive_ext: tar.gz

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-x86_64
            archive_ext: tar.gz

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libasound2-dev libpulse-dev

      - name: Build release binaries
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p nexterm-server
          -p nexterm-client-gpu
          -p nexterm-client-tui
          -p nexterm-ctl

      # ── Unix 向けパッケージング ──
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/nexterm-server     dist/
          cp target/${{ matrix.target }}/release/nexterm-client-gpu  dist/
          cp target/${{ matrix.target }}/release/nexterm-client-tui  dist/
          cp target/${{ matrix.target }}/release/nexterm-ctl         dist/
          tar -czf nexterm-${{ github.ref_name }}-${{ matrix.name }}.tar.gz -C dist .

      # ── Windows 向けパッケージング ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/nexterm-server.exe     dist/
          Copy-Item target/${{ matrix.target }}/release/nexterm-client-gpu.exe  dist/
          Copy-Item target/${{ matrix.target }}/release/nexterm-client-tui.exe  dist/
          Copy-Item target/${{ matrix.target }}/release/nexterm-ctl.exe         dist/
          Compress-Archive -Path dist/* -DestinationPath nexterm-${{ github.ref_name }}-${{ matrix.name }}.zip

      # ── GitHub Release にアーカイブを添付 ──
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nexterm-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.archive_ext }}

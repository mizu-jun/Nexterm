name: Flatpak

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify cargo-sources.json is in sync with Cargo.lock
        # Cargo.lock を更新したのに pkg/flatpak/cargo-sources.json を再生成し忘れた場合に
        # ここでビルドを止めてメンテナンス漏れを早期検知する。
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet \
            'aiohttp>=3.9.5,<4.0.0' 'PyYAML>=6.0.2,<7.0.0' 'tomlkit>=0.13.3,<1.0'
          curl -fsSL \
            -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock -o /tmp/cargo-sources.json
          if ! diff -q pkg/flatpak/cargo-sources.json /tmp/cargo-sources.json >/dev/null 2>&1; then
            echo "::error::pkg/flatpak/cargo-sources.json が Cargo.lock と整合していません。"
            echo "::error::ローカルで 'bash scripts/regenerate-flatpak-sources.sh' を実行してコミットしてください。"
            diff -u pkg/flatpak/cargo-sources.json /tmp/cargo-sources.json | head -200 || true
            exit 1
          fi
          echo "OK: cargo-sources.json は Cargo.lock と整合しています。"

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder elfutils

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install freedesktop SDK
        # 24.08 系列で Rust 1.85+ が提供されるため、edition = "2024" を満たすために必須
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak bundle
        run: |
          flatpak-builder \
            --user \
            --repo=repo \
            --force-clean \
            builddir \
            pkg/flatpak/io.github.mizu_jun.Nexterm.yaml

          flatpak build-bundle repo \
            "nexterm-${{ github.ref_name }}-linux-x86_64.flatpak" \
            io.github.mizu_jun.Nexterm

      - name: Upload Flatpak to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: nexterm-${{ github.ref_name }}-linux-x86_64.flatpak

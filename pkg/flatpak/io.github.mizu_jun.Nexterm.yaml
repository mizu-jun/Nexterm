app-id: io.github.mizu_jun.Nexterm
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: nexterm

finish-args:
  # ディスプレイアクセス（X11 / Wayland）
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU アクセス（wgpu レンダリング）
  - --device=dri
  # ネットワークアクセス（SSH 接続）
  - --share=network
  # ホームディレクトリ読み書き（設定・スナップショット）
  - --filesystem=home
  # PTY デバイスへのアクセス
  - --device=all
  # システムトレイ（将来用）
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/nexterm/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: nexterm
    buildsystem: simple
    build-commands:
      # Rust ビルド
      - cargo build --release
          -p nexterm-server
          -p nexterm-client-gpu
          -p nexterm-client-tui
          -p nexterm-ctl
          -p nexterm-launcher
      # バイナリをインストール
      - install -Dm755 target/release/nexterm          /app/bin/nexterm
      - install -Dm755 target/release/nexterm-server   /app/bin/nexterm-server
      - install -Dm755 target/release/nexterm-client-gpu  /app/bin/nexterm-client-gpu
      - install -Dm755 target/release/nexterm-client-tui  /app/bin/nexterm-client-tui
      - install -Dm755 target/release/nexterm-ctl      /app/bin/nexterm-ctl
      # .desktop ファイルとアイコン
      - install -Dm644 linux/nexterm.desktop
          /app/share/applications/io.github.mizu_jun.Nexterm.desktop
      - install -Dm644 assets/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.mizu_jun.Nexterm.png
      # AppStream メタデータ
      - install -Dm644 pkg/flatpak/io.github.mizu_jun.Nexterm.metainfo.xml
          /app/share/metainfo/io.github.mizu_jun.Nexterm.metainfo.xml
    sources:
      - type: dir
        path: ../../
        skip:
          - .git
          - target

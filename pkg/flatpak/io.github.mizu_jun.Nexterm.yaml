app-id: io.github.mizu_jun.Nexterm
runtime: org.freedesktop.Platform
# 24.08 に bump (Rust 1.85+ を含む rust-stable Extension が必要 — workspace edition = 2024)
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: nexterm

finish-args:
  # ディスプレイアクセス（X11 / Wayland）
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU アクセス（wgpu レンダリング）
  - --device=dri
  # ネットワークアクセス（SSH 接続）
  - --share=network
  # ホームディレクトリ読み書き（設定・スナップショット）
  - --filesystem=home
  # PTY デバイスへのアクセス
  - --device=all
  # システムトレイ（将来用）
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/nexterm/cargo
    RUST_BACKTRACE: '1'
    # flatpak-builder のサンドボックスはネットワーク隔離されているため、
    # cargo-sources.json で vendor 済みの依存を使ってオフラインビルドする。
    CARGO_NET_OFFLINE: 'true'

modules:
  - name: nexterm
    buildsystem: simple
    build-commands:
      # Rust ビルド（--offline で crates.io への接続を完全に禁止）
      # nexterm-client-gpu の bin name = "nexterm" がエントリポイント。
      # サーバーは nexterm-client-gpu が内部 tokio タスクとして起動するため別プロセス不要。
      - cargo --offline build --release
          -p nexterm-server
          -p nexterm-client-gpu
          -p nexterm-client-tui
          -p nexterm-ctl
      # バイナリをインストール
      - install -Dm755 target/release/nexterm          /app/bin/nexterm
      - install -Dm755 target/release/nexterm-server   /app/bin/nexterm-server
      - install -Dm755 target/release/nexterm-client-tui  /app/bin/nexterm-client-tui
      - install -Dm755 target/release/nexterm-ctl      /app/bin/nexterm-ctl
      # .desktop ファイル: Flatpak は app-id と同名の Icon= が必須なので
      # linux/nexterm.desktop の Icon=utilities-terminal を io.github.mizu_jun.Nexterm に書き換える。
      - sed 's|^Icon=.*|Icon=io.github.mizu_jun.Nexterm|'
          linux/nexterm.desktop
          > nexterm.flatpak.desktop
      - install -Dm644 nexterm.flatpak.desktop
          /app/share/applications/io.github.mizu_jun.Nexterm.desktop
      # 実体は 512x512 の assets/nexterm-source.png（hicolor の 512x512 階層に配置）
      - install -Dm644 assets/nexterm-source.png
          /app/share/icons/hicolor/512x512/apps/io.github.mizu_jun.Nexterm.png
      # AppStream メタデータ
      - install -Dm644 pkg/flatpak/io.github.mizu_jun.Nexterm.metainfo.xml
          /app/share/metainfo/io.github.mizu_jun.Nexterm.metainfo.xml
    sources:
      - type: dir
        path: ../../
        skip:
          - .git
          - target
      # Cargo の vendor 済みクレート群（flatpak-cargo-generator.py で生成）。
      # Cargo.lock が変わったら scripts/regenerate-flatpak-sources.sh で再生成する。
      - cargo-sources.json
